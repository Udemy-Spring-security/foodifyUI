<div class="page-container">

  <app-header></app-header>


  <section class="restaurants-grid">

    <div class="restaurant-card" *ngFor="let restaurant of restaurants">

      <img [src]="restaurant.image" alt="restaurant" />

      <div class="card-body">
        <h3>{{ restaurant.name }}</h3>
        <p class="cuisine">{{ restaurant.cuisine }}</p>

        <div class="meta">
          <span class="rating">⭐ {{ restaurant.rating }}</span>
           <div class="meta-buttons"></div>
          <button (click)="viewMenu(restaurant.id)">
            View Menu
          </button>
          <button *ngIf="isAdmin" class="delete-btn" (click)="deleteRestaurant(restaurant.id)">
            Delete
          </button>
          </div>
        </div>
      </div>


  </section>

</div>
